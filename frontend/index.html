<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KYC · Acceso</title>
    <!-- Aplica el tema guardado antes de pintar para evitar el parpadeo (FOUC).
         Debe coincidir con la lógica de src/theme (clave kyc_theme + clase dark). -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('kyc_theme') || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', !!dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
